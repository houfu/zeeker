[tool.uv.workspace]
members = [
    "packages/zeeker",
    "packages/zeeker-common",
    "packages/zeeker-datasette",
    "examples/legal-news",
    "examples/datasets"
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.4.0",
    "pytest-cov>=6.2.1",
    "black>=25.1.0",
    "ruff>=0.8.0",
]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
