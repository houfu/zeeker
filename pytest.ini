[pytest]
testpaths = packages/zeeker/tests packages/zeeker-common/tests packages/zeeker-datasette/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    -ra
    --cov=packages/zeeker/zeeker
    --cov=packages/zeeker-common/zeeker_common
    --cov=packages/zeeker-datasette/zeeker_datasette
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=65
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    cli: CLI interface tests
    slow: Tests that take longer to run
    anyio: Async tests using pytest-anyio

[coverage:run]
omit =
    */templates/*.j2
    */tests/*
    */__pycache__/*
    */site-packages/*
